 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Race Coast Sales Window</title>
  <style>
    :root {
      --bg:#f4f6fa; --card:#fff; --text:#1f2937; --muted:#6b7280; --line:#dde3ec;
      --accent:#0f3d75; --accent2:#1d4f91; --soft:#eef3fb; --yes:#146534; --no:#b42318;
    }
    * { box-sizing:border-box; }
    body { margin:0; font-family:Arial,Helvetica,sans-serif; background:var(--bg); color:var(--text); }
    header { position:sticky; top:0; z-index:30; background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#fff; padding:12px 14px; box-shadow:0 2px 10px rgba(0,0,0,.12); }
    .topbar { display:grid; grid-template-columns:minmax(0,1fr) auto auto; gap:10px; align-items:center; }
    .brand h1 { margin:0; font-size:20px; }
    .brand .sub { font-size:12px; opacity:.9; margin-top:2px; }
    .topbar input { width:100%; min-width:0; padding:11px 12px; border:none; border-radius:12px; font-size:14px; }
    .topbar button, .pillbtn { background:#fff; color:var(--accent); border:none; border-radius:12px; padding:11px 12px; font-weight:700; cursor:pointer; }
    .quickbar { display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; }
    .quickbar .pillbtn { padding:8px 12px; font-size:13px; }
    .banner { display:none; margin-top:10px; background:#edf4ff; color:#1f3f8f; border-radius:12px; padding:10px 12px; font-size:13px; font-weight:700; }
    main { max-width:1450px; margin:0 auto; padding:16px; }
    .summary { display:flex; justify-content:space-between; gap:8px; flex-wrap:wrap; color:var(--muted); font-size:14px; margin-bottom:12px; }
    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:16px; }
    .card { background:var(--card); border:1px solid var(--line); border-radius:18px; overflow:hidden; box-shadow:0 10px 24px rgba(0,0,0,.06); }
    .imgwrap { aspect-ratio:4/3; background:#eef2f7; overflow:hidden; }
    .imgwrap img { width:100%; height:100%; object-fit:cover; display:block; }
    .imgfallback { height:100%; display:flex; align-items:center; justify-content:center; color:var(--muted); font-size:13px; padding:16px; text-align:center; }
    .content { padding:14px; }
    .rowtop { display:flex; gap:10px; justify-content:space-between; align-items:flex-start; }
    .lot { color:var(--accent); font-weight:700; font-size:12px; letter-spacing:.5px; text-transform:uppercase; }
    .name { font-size:19px; font-weight:700; line-height:1.2; margin-top:3px; }
    .sex { background:var(--soft); color:var(--muted); border-radius:999px; padding:6px 10px; font-size:12px; white-space:nowrap; }
    .meta { font-size:14px; line-height:1.45; margin-top:6px; }
    .label { color:var(--muted); font-weight:700; }
    .chips { display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; }
    .chip { border-radius:999px; padding:6px 10px; font-size:12px; font-weight:700; background:#eef2ff; color:#3947a8; }
    .chip.yes { background:#e4f7ea; color:var(--yes); }
    .chip.no { background:#fdecec; color:var(--no); }
    .scores { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-top:10px; }
    .score { background:#f8fafc; border:1px solid var(--line); border-radius:12px; padding:8px; text-align:center; }
    .score .k { font-size:12px; color:var(--muted); }
    .score .v { font-size:20px; font-weight:700; color:#8b6f00; }
    .notes { margin-top:10px; font-size:13px; background:#fafcff; border:1px solid var(--line); border-radius:12px; padding:10px; }
    .actions { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-top:12px; }
    .actions a, .actions button { text-decoration:none; text-align:center; border:none; border-radius:10px; padding:10px 10px; font-size:13px; font-weight:700; cursor:pointer; }
    .actions .primary { background:var(--accent); color:#fff; }
    .actions .secondary { background:#eef2ff; color:var(--accent); border:1px solid #dbe4ff; }
    .actions .ghost { background:#f8fafc; color:var(--accent); border:1px solid var(--line); }
    dialog { width:min(520px, calc(100vw - 24px)); border:none; border-radius:18px; padding:0; box-shadow:0 24px 70px rgba(0,0,0,.28); }
    dialog::backdrop { background:rgba(15,23,42,.55); }
    .drawer { width:min(420px, calc(100vw - 18px)); margin-right:10px; margin-left:auto; max-height:calc(100vh - 20px); overflow:auto; }
    .modalhead { padding:16px 18px; background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#fff; }
    .modalbody { padding:16px 18px 18px; }
    .field { margin-bottom:12px; }
    .field label { display:block; font-size:13px; color:var(--muted); font-weight:700; margin-bottom:6px; }
    .field input, .field select, .field textarea { width:100%; padding:10px 12px; border-radius:10px; border:1px solid var(--line); font-size:14px; }
    .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .radioRow { display:flex; gap:12px; flex-wrap:wrap; padding-top:5px; }
    .radioRow label { display:flex; gap:6px; align-items:center; font-weight:400; color:var(--text); }
    .modalactions { display:flex; justify-content:space-between; gap:10px; flex-wrap:wrap; margin-top:10px; }
    .modalactions button { border:none; border-radius:10px; padding:10px 12px; font-weight:700; cursor:pointer; }
    .mutedbtn { background:#f8fafc; color:var(--accent); border:1px solid var(--line); }
    .primarybtn { background:var(--accent); color:#fff; }
    .dangerbtn { background:#fdecec; color:var(--no); }
    .small { font-size:12px; color:var(--muted); }
    @media (max-width:760px) {
      .topbar { grid-template-columns:1fr auto; }
      .brand { grid-column:1 / -1; }
      .actions { grid-template-columns:1fr 1fr; }
      .grid2 { grid-template-columns:1fr; }
    }
  </style>
</head>
<body>
  <header>
    <div class="topbar">
      <div class="brand">
        <h1>2026 Premier Yearling Sale</h1>
        <div class="sub">Photos and pedigrees restored. Filters are tucked away in a compact panel.</div>
      </div>
      <input id="search" type="text" placeholder="Search lot, horse, sire, dam, vendor" />
      <button id="openFiltersBtn" type="button">Filters</button>
    </div>
    <div class="quickbar">
      <button class="pillbtn" id="shortlistBtn" type="button">Shortlist</button>
      <button class="pillbtn" id="allLotsBtn" type="button">All lots</button>
      <button class="pillbtn" id="exportBtn" type="button">Export updates</button>
      <button class="pillbtn" id="importBtn" type="button">Import updates</button>
      <input id="importFile" type="file" accept="application/json" hidden />
    </div>
    <div id="shortlistBanner" class="banner">Shortlist view is on: showing only YES horses, sorted by total highest first.</div>
  </header>

  <main>
    <div id="summary" class="summary"></div>
    <div id="grid" class="grid"></div>
  </main>

  <dialog id="filtersDialog" class="drawer">
    <div class="modalhead"><div style="font-size:19px;font-weight:700;">Filters and sorting</div></div>
    <div class="modalbody">
      <div class="field">
        <label for="vendorFilter">Vendor</label>
        <select id="vendorFilter"><option value="">All vendors</option></select>
      </div>
      <div class="grid2">
        <div class="field">
          <label for="choiceFilter">Decision</label>
          <select id="choiceFilter">
            <option value="">All decisions</option>
            <option value="yes">Yes only</option>
            <option value="no">No only</option>
            <option value="undecided">Undecided only</option>
          </select>
        </div>
        <div class="field">
          <label for="pickedFilter">Updated status</label>
          <select id="pickedFilter">
            <option value="">All lots</option>
            <option value="picked">Only scored / updated lots</option>
          </select>
        </div>
      </div>
      <div class="grid2">
        <div class="field">
          <label for="sortBy">Sort by</label>
          <select id="sortBy">
            <option value="lot">Lot</option>
            <option value="physical">Physical score</option>
            <option value="pedigree">Pedigree score</option>
            <option value="total">Total score</option>
          </select>
        </div>
        <div class="field">
          <label for="sortDir">Order</label>
          <select id="sortDir">
            <option value="asc">Lowest / A-Z first</option>
            <option value="desc">Highest first</option>
          </select>
        </div>
      </div>
      <div class="modalactions">
        <button class="mutedbtn" id="closeFiltersBtn" type="button">Close</button>
        <button class="mutedbtn" id="clearFiltersBtn" type="button">Clear filters</button>
      </div>
    </div>
  </dialog>

  <dialog id="editDialog">
    <div class="modalhead">
      <div id="modalTitle" style="font-size:20px;font-weight:700;"></div>
      <div id="modalSub" style="font-size:13px;opacity:.95;margin-top:4px;"></div>
    </div>
    <form method="dialog" id="editForm">
      <div class="modalbody">
        <div class="field">
          <label>Decision</label>
          <div class="radioRow">
            <label><input type="radio" name="choice" value="yes"> Yes</label>
            <label><input type="radio" name="choice" value="no"> No</label>
            <label><input type="radio" name="choice" value="undecided"> Undecided</label>
          </div>
        </div>
        <div class="grid2">
          <div class="field">
            <label for="physicalScore">Physical score (1 to 5)</label>
            <select id="physicalScore"><option value="">None</option><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option></select>
          </div>
          <div class="field">
            <label for="pedigreeScore">Pedigree score (1 to 5)</label>
            <select id="pedigreeScore"><option value="">None</option><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option></select>
          </div>
        </div>
        <div class="field">
          <label for="secondLink">Second link</label>
          <input id="secondLink" type="url" placeholder="https://..." />
        </div>
        <div class="field">
          <label for="notes">Notes</label>
          <textarea id="notes" rows="4" placeholder="Your notes..."></textarea>
        </div>
        <div class="small">Your decisions are saved in this browser automatically. Use Export to back them up to a file.</div>
        <div class="modalactions">
          <button class="dangerbtn" id="deleteEntryBtn" type="button">Clear entry</button>
          <div style="display:flex;gap:8px;flex-wrap:wrap;">
            <button class="mutedbtn" id="cancelBtn" type="button">Cancel</button>
            <button class="primarybtn" id="saveBtn" type="submit">Save</button>
          </div>
        </div>
      </div>
    </form>
  </dialog>

        const hay = `${r.lot} ${r.name} ${r.sire} ${r.dam} ${r.vendor}`.toLowerCase();
        const choice = r.choice || 'undecided';
        return (!q || hay.includes(q)) && (!selectedVendor || r.vendor === selectedVendor) && (!selectedChoice || choice === selectedChoice) && (pickedMode !== 'picked' || isPicked(r));
      }).sort((a,b)=>compareValues(a,b,sortBy.value,sortDir.value));
    }
    function render() {
      const records = filteredData();
      const shortlistOn = choiceFilter.value === 'yes' && pickedFilter.value === 'picked' && sortBy.value === 'total' && sortDir.value === 'desc';
      shortlistBanner.style.display = shortlistOn ? 'block' : 'none';
      const yesCount = Object.values(edits).filter(e => e.choice === 'yes').length;
      const pickedCount = Object.values(edits).filter(isPicked).length;
      summary.innerHTML = `<div>${records.length} lot${records.length===1?'':'s'} shown</div><div>${pickedCount} updated • ${yesCount} yes</div>`;
      grid.innerHTML = '';
      records.forEach(record => {
        const card = document.createElement('article');
        const choice = record.choice || 'undecided';
        const chipClass = choice === 'yes' ? 'chip yes' : choice === 'no' ? 'chip no' : 'chip';
        const linkButton = record.secondLink ? `<a class="ghost" href="${escapeHtml(record.secondLink)}" target="_blank" rel="noopener noreferrer">2nd link</a>` : `<button class="ghost" type="button" data-edit="${record.lot}">Update</button>`;
        const notesBlock = record.notes ? `<div class="notes"><span class="label">Notes:</span> ${escapeHtml(record.notes)}</div>` : '';
        card.className = 'card';
        card.innerHTML = `
          <div class="imgwrap">
            <img src="${lotImage(record.lot)}" alt="Lot ${record.lot}" loading="lazy" onerror="this.style.display='none';this.parentElement.innerHTML='<div class=\'imgfallback\'>No image found for Lot ${record.lot}</div>'">
          </div>
          <div class="content">
            <div class="rowtop">
              <div><div class="lot">Lot ${record.lot}</div><div class="name">${escapeHtml(record.name)}</div></div>
              <div class="sex">${escapeHtml(record.sex || '')}</div>
            </div>
            <div class="chips"><span class="${chipClass}">${choice ? choice.toUpperCase() : 'UNDECIDED'}</span><span class="chip">${escapeHtml(record.vendor)}</span></div>
            <div class="meta"><span class="label">Sire:</span> ${escapeHtml(record.sire)}</div>
            <div class="meta"><span class="label">Dam:</span> ${escapeHtml(record.dam)}</div>
            <div class="scores">
              <div class="score"><div class="k">Physical</div><div class="v">${record.physicalScore || '-'}</div></div>
              <div class="score"><div class="k">Pedigree</div><div class="v">${record.pedigreeScore || '-'}</div></div>
              <div class="score"><div class="k">Total</div><div class="v">${record.total || '-'}</div></div>
            </div>
            ${notesBlock}
            <div class="actions">
              <a class="primary" href="${lotImage(record.lot)}" target="_blank" rel="noopener noreferrer">Photo</a>
              <a class="secondary" href="${lotPedigree(record.lot)}" target="_blank" rel="noopener noreferrer">Pedigree</a>
              <button class="primary" type="button" data-edit="${record.lot}">Score</button>
              ${linkButton}
            </div>
          </div>`;
        grid.appendChild(card);
      });
      grid.querySelectorAll('[data-edit]').forEach(btn => btn.addEventListener('click', () => openEditor(Number(btn.dataset.edit))));
    }
    function openEditor(lot) {
      currentLot = lot;
      const base = lots.find(x => x.lot === lot);
      const entry = getEdit(lot);
      modalTitle.textContent = `Lot ${lot} — ${base.name}`;
      modalSub.textContent = `${base.sire} x ${base.dam}`;
      editForm.querySelectorAll('input[name="choice"]').forEach(r => r.checked = (entry.choice || 'undecided') === r.value);
      if (!entry.choice) editForm.querySelector('input[name="choice"][value="undecided"]').checked = true;
      physicalScore.value = entry.physicalScore || '';
      pedigreeScore.value = entry.pedigreeScore || '';
      secondLink.value = entry.secondLink || '';
      notes.value = entry.notes || '';
      dialog.showModal();
    }
    function saveCurrentEntry() {
      if (currentLot == null) return;
      const choice = editForm.querySelector('input[name="choice"]:checked')?.value || 'undecided';
      edits[String(currentLot)] = { choice, physicalScore: physicalScore.value, pedigreeScore: pedigreeScore.value, secondLink: secondLink.value.trim(), notes: notes.value.trim() };
      if (!isPicked(edits[String(currentLot)])) delete edits[String(currentLot)];
      saveEdits();
      dialog.close();
      render();
    }
    function clearCurrentEntry() {
      if (currentLot == null) return;
      delete edits[String(currentLot)];
      saveEdits();
      dialog.close();
      render();
    }
    function exportData() {
      const blob = new Blob([JSON.stringify(edits,null,2)],{type:'application/json'});
      const url = URL.createObjectURL(blob);
      const a=document.createElement('a');
      a.href=url;
      a.download='racecoast-sales-window-updates.json';
      a.click();
      URL.revokeObjectURL(url);
    }
    function importData(file) {
      const reader=new FileReader();
      reader.onload=()=>{
        try {
          const parsed=JSON.parse(reader.result);
          edits=(parsed && typeof parsed==='object') ? parsed : {};
          saveEdits();
          render();
          alert('Updates imported.');
        } catch {
          alert('Could not import that file.');
        }
      };
      reader.readAsText(file);
    }

    openFiltersBtn.addEventListener('click', () => filtersDialog.showModal());
    closeFiltersBtn.addEventListener('click', () => filtersDialog.close());
    [search,vendorFilter,choiceFilter,pickedFilter,sortBy,sortDir].forEach(el => el.addEventListener('input', render));
    [vendorFilter,choiceFilter,pickedFilter,sortBy,sortDir].forEach(el => el.addEventListener('change', render));
    clearFiltersBtn.addEventListener('click', () => {
      vendorFilter.value=''; choiceFilter.value=''; pickedFilter.value=''; sortBy.value='lot'; sortDir.value='asc'; render();
    });
    shortlistBtn.addEventListener('click', () => {
      pickedFilter.value='picked'; choiceFilter.value='yes'; sortBy.value='total'; sortDir.value='desc'; render();
    });
    allLotsBtn.addEventListener('click', () => {
      search.value=''; vendorFilter.value=''; choiceFilter.value=''; pickedFilter.value=''; sortBy.value='lot'; sortDir.value='asc'; render();
    });
    exportBtn.addEventListener('click', exportData);
    importBtn.addEventListener('click', () => importFile.click());
    importFile.addEventListener('change', e => {
      const file=e.target.files?.[0];
      if(file) importData(file);
      importFile.value='';
    });
    editForm.addEventListener('submit', e => { e.preventDefault(); saveCurrentEntry(); });
    cancelBtn.addEventListener('click', () => dialog.close());
    deleteEntryBtn.addEventListener('click', clearCurrentEntry);

    populateVendorFilter();
    render();
  </script>
</body>
</html>
