<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Race Coast Sales Window</title>
  <style>
    :root {
      --bg:#f3f5f9; --card:#fff; --text:#1f2937; --muted:#6b7280; --line:#dce3ed;
      --accent:#0f3d75; --soft:#eef3fb; --yes:#0f8a3b; --no:#b42318; --und:#4f46e5;
    }
    * { box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
    body { margin:0; font-family:Arial,Helvetica,sans-serif; background:var(--bg); color:var(--text); }
    header {
      position:sticky; top:0; z-index:40; background:rgba(15,61,117,.96); backdrop-filter: blur(8px);
      color:#fff; padding:8px 10px; box-shadow:0 2px 8px rgba(0,0,0,.12);
    }
    .topbar { display:grid; grid-template-columns:minmax(0,1fr) auto auto auto; gap:8px; align-items:center; }
    .search { width:100%; min-width:0; border:none; border-radius:12px; padding:10px 12px; font-size:14px; }
    .iconbtn, .segbtn, .tinybtn, .scorebtn, .chipbtn {
      border:none; border-radius:10px; cursor:pointer; font-weight:700; font-size:13px;
    }
    .iconbtn { background:#fff; color:var(--accent); padding:10px 11px; min-width:42px; }
    .subbar { display:flex; gap:8px; flex-wrap:wrap; margin-top:8px; }
    .segbtn { background:#ffffff22; color:#fff; padding:7px 10px; }
    .segbtn.active { background:#fff; color:var(--accent); }
    main { max-width:1500px; margin:0 auto; padding:10px; }
    .summary { color:var(--muted); font-size:13px; margin:2px 2px 10px; display:flex; justify-content:space-between; flex-wrap:wrap; gap:8px; }
    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(250px,1fr)); gap:12px; }
    .card { background:var(--card); border:1px solid var(--line); border-radius:16px; overflow:hidden; box-shadow:0 8px 20px rgba(0,0,0,.06); }
    .media { position:relative; aspect-ratio:4/3; background:#e9eef5; overflow:hidden; }
    .media img { width:100%; height:100%; object-fit:cover; display:block; }
    .imgfallback { height:100%; display:flex; align-items:center; justify-content:center; color:var(--muted); font-size:12px; padding:14px; text-align:center; }
    .overlayTop, .overlayBottom {
      position:absolute; left:8px; right:8px; display:flex; align-items:center; justify-content:space-between; gap:8px;
    }
    .overlayTop { top:8px; }
    .overlayBottom { bottom:8px; }
    .glass {
      background:rgba(255,255,255,.92); backdrop-filter: blur(5px); border:1px solid rgba(255,255,255,.6);
      border-radius:999px; padding:5px 8px; font-size:12px; font-weight:700; color:var(--text);
    }
    .glassGroup {
      background:rgba(255,255,255,.92); backdrop-filter: blur(5px); border:1px solid rgba(255,255,255,.6);
      border-radius:999px; padding:3px; display:flex; gap:3px;
    }
    .choiceBtn, .scorebtn, .chipbtn {
      min-width:28px; height:28px; padding:0 8px; background:transparent; color:var(--text);
      border-radius:999px;
    }
    .choiceBtn.active.y { background:#e4f7ea; color:var(--yes); }
    .choiceBtn.active.u { background:#eef2ff; color:var(--und); }
    .choiceBtn.active.n { background:#fdecec; color:var(--no); }
    .body { padding:10px; }
    .titleRow { display:flex; justify-content:space-between; gap:8px; align-items:flex-start; }
    .lot { color:var(--accent); font-size:11px; font-weight:700; letter-spacing:.4px; text-transform:uppercase; }
    .name { font-size:16px; font-weight:700; line-height:1.15; margin-top:2px; }
    .sex { font-size:11px; color:var(--muted); background:var(--soft); border-radius:999px; padding:5px 8px; }
    .meta { font-size:13px; line-height:1.35; margin-top:5px; }
    .label { color:var(--muted); font-weight:700; }
    .compactRow { display:flex; gap:6px; flex-wrap:wrap; align-items:center; margin-top:8px; }
    .chipbtn { background:#f7f9fc; border:1px solid var(--line); color:var(--accent); padding:0 9px; width:auto; }
    .scoreGroup { display:flex; gap:4px; align-items:center; }
    .scoreTag { font-size:11px; color:var(--muted); font-weight:700; padding-right:2px; }
    .scorebtn { background:#f7f9fc; border:1px solid var(--line); }
    .scorebtn.active { background:var(--accent); color:#fff; border-color:var(--accent); }
    .notes { margin-top:8px; font-size:12px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    dialog { width:min(420px, calc(100vw - 18px)); border:none; border-radius:18px; padding:0; box-shadow:0 24px 70px rgba(0,0,0,.28); }
    dialog::backdrop { background:rgba(15,23,42,.45); }
    .drawer { width:min(360px, calc(100vw - 18px)); margin-left:auto; max-height:calc(100vh - 12px); overflow:auto; }
    .modalhead { padding:14px 16px; background:var(--accent); color:#fff; font-size:18px; font-weight:700; }
    .modalbody { padding:14px 16px 16px; }
    .field { margin-bottom:12px; }
    .field label { display:block; margin-bottom:6px; font-size:12px; color:var(--muted); font-weight:700; }
    .field input, .field select, .field textarea { width:100%; border:1px solid var(--line); border-radius:10px; padding:10px 11px; font-size:14px; }
    .modalactions { display:flex; justify-content:space-between; gap:8px; flex-wrap:wrap; margin-top:10px; }
    .tinybtn { padding:10px 12px; }
    .primary { background:var(--accent); color:#fff; }
    .muted { background:#f7f9fc; color:var(--accent); border:1px solid var(--line); }
    .danger { background:#fdecec; color:var(--no); }
    @media (max-width:760px) {
      .topbar { grid-template-columns:minmax(0,1fr) auto auto; }
      .hideMobile { display:none; }
      .grid { grid-template-columns:1fr; gap:10px; }
      main { padding:8px; }
      .body { padding:9px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="topbar">
      <input id="search" class="search" type="text" placeholder="Search" />
      <button id="openFiltersBtn" class="iconbtn" type="button">☰</button>
      <button id="shortlistBtn" class="iconbtn" type="button">✓</button>
      <button id="allLotsBtn" class="iconbtn hideMobile" type="button">All</button>
    </div>
    <div class="subbar">
      <button id="rankTotalBtn" class="segbtn" type="button">T</button>
      <button id="rankPhysicalBtn" class="segbtn" type="button">P</button>
      <button id="rankPedigreeBtn" class="segbtn" type="button">G</button>
      <button id="exportBtn" class="segbtn" type="button">⇩</button>
      <button id="importBtn" class="segbtn" type="button">⇧</button>
      <input id="importFile" type="file" accept="application/json" hidden />
    </div>
  </header>

  <main>
    <div id="summary" class="summary"></div>
    <div id="grid" class="grid"></div>
  </main>

  <dialog id="filtersDialog" class="drawer">
    <div class="modalhead">Filters</div>
    <div class="modalbody">
      <div class="field">
        <label for="vendorFilter">Vendor</label>
        <select id="vendorFilter"><option value="">All vendors</option></select>
      </div>
      <div class="field">
        <label for="choiceFilter">Decision</label>
        <select id="choiceFilter">
          <option value="">All</option>
          <option value="yes">Yes</option>
          <option value="no">No</option>
          <option value="undecided">Undecided</option>
        </select>
      </div>
      <div class="field">
        <label for="pickedFilter">Updated</label>
        <select id="pickedFilter">
          <option value="">All lots</option>
          <option value="picked">Updated only</option>
        </select>
      </div>
      <div class="field">
        <label for="sortBy">Sort</label>
        <select id="sortBy">
          <option value="lot">Lot</option>
          <option value="physical">Physical</option>
          <option value="pedigree">Pedigree</option>
          <option value="total">Total</option>
        </select>
      </div>
      <div class="field">
        <label for="sortDir">Order</label>
        <select id="sortDir">
          <option value="asc">Low / A-Z first</option>
          <option value="desc">High first</option>
        </select>
      </div>
      <div class="modalactions">
        <button id="closeFiltersBtn" class="tinybtn muted" type="button">Close</button>
        <button id="clearFiltersBtn" class="tinybtn muted" type="button">Clear</button>
      </div>
    </div>
  </dialog>

  <dialog id="adminDialog">
    <div class="modalhead" id="modalTitle">Admin</div>
    <div class="modalbody">
      <div id="modalSub" style="font-size:12px;color:var(--muted);margin-bottom:12px;"></div>
      <div class="field">
        <label for="secondLink">Second link</label>
        <input id="secondLink" type="url" placeholder="https://..." />
      </div>
      <div class="field">
        <label for="notes">Notes</label>
        <textarea id="notes" rows="4" placeholder="Notes..."></textarea>
      </div>
      <div class="modalactions">
        <button id="deleteEntryBtn" class="tinybtn danger" type="button">Clear</button>
        <div style="display:flex;gap:8px;">
          <button id="cancelBtn" class="tinybtn muted" type="button">Cancel</button>
          <button id="saveBtn" class="tinybtn primary" type="button">Save</button>
        </div>
      </div>
    </div>
  </dialog>

LLY","sire":"DANON PLATINA (JPN)","dam":"BOBTAIL","vendor":"AMBIANCE STUD"},{"lot":264,"name":"UNNAMED","sex":"COLT","sire":"ERUPT (IRE)","dam":"BONNE BOUCHE","vendor":"DRAKENSTEIN STUD"},{"lot":265,"name":"IN THE LOOP","sex":"COLT","sire":"NEW PREDATOR (AUS)","dam":"BOOM BANG","vendor":"WILGERBOSDRIFT"},{"lot":266,"name":"UNNAMED","sex":"FILLY","sire":"ERUPT (IRE)","dam":"BRAVE MOVE","vendor":"VARSFONTEIN STUD"},{"lot":267,"name":"UNNAMED","sex":"FILLY","sire":"ERUPT (IRE)","dam":"BREAK THE SPELL","vendor":"DRAKENSTEIN STUD"},{"lot":268,"name":"UNNAMED","sex":"FILLY","sire":"THE UNITED STATES (IRE)","dam":"BREATHLESS BERTHA","vendor":"VARSFONTEIN STUD"},{"lot":269,"name":"UNNAMED","sex":"COLT","sire":"MASTER OF MY FATE","dam":"BRIGTNUMBERFOUR","vendor":"DRAKENSTEIN STUD"},{"lot":270,"name":"UNNAMED","sex":"COLT","sire":"KOMMETDIEDING","dam":"JET SET MODEL","vendor":"KLAWERVLEI STUD (AS AGENT)"}];

    let edits = loadEdits();
    let currentLot = null;

    const grid = document.getElementById('grid');
    const summary = document.getElementById('summary');
    const search = document.getElementById('search');
    const openFiltersBtn = document.getElementById('openFiltersBtn');
    const filtersDialog = document.getElementById('filtersDialog');
    const closeFiltersBtn = document.getElementById('closeFiltersBtn');
    const vendorFilter = document.getElementById('vendorFilter');
    const choiceFilter = document.getElementById('choiceFilter');
    const pickedFilter = document.getElementById('pickedFilter');
    const sortBy = document.getElementById('sortBy');
    const sortDir = document.getElementById('sortDir');
    const clearFiltersBtn = document.getElementById('clearFiltersBtn');
    const shortlistBtn = document.getElementById('shortlistBtn');
    const allLotsBtn = document.getElementById('allLotsBtn');
    const rankTotalBtn = document.getElementById('rankTotalBtn');
    const rankPhysicalBtn = document.getElementById('rankPhysicalBtn');
    const rankPedigreeBtn = document.getElementById('rankPedigreeBtn');
    const exportBtn = document.getElementById('exportBtn');
    const importBtn = document.getElementById('importBtn');
    const importFile = document.getElementById('importFile');

    const adminDialog = document.getElementById('adminDialog');
    const modalTitle = document.getElementById('modalTitle');
    const modalSub = document.getElementById('modalSub');
    const secondLink = document.getElementById('secondLink');
    const notes = document.getElementById('notes');
    const saveBtn = document.getElementById('saveBtn');
    const cancelBtn = document.getElementById('cancelBtn');
    const deleteEntryBtn = document.getElementById('deleteEntryBtn');

    function loadEdits() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch { return {}; } }
    function saveEdits() { localStorage.setItem(STORAGE_KEY, JSON.stringify(edits)); }
    function getEdit(lot) { return edits[String(lot)] || {}; }
    function totalScore(entry) { return Number(entry.physicalScore || 0) + Number(entry.pedigreeScore || 0); }
    function isPicked(entry) { return Boolean(entry.choice || entry.physicalScore || entry.pedigreeScore || entry.notes || entry.secondLink); }
    function lotImage(lot) { return `${BASE}/2026-PYS-${lot}.jpg`; }
    function lotPedigree(lot) { return `${BASE}/2026-PYS-${lot}.pdf`; }
    function escapeHtml(str) { return String(str ?? '').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#39;'); }
    function populateVendorFilter() {
      const vendors = [...new Set(lots.map(x => x.vendor).filter(Boolean))].sort((a,b)=>a.localeCompare(b));
      vendorFilter.innerHTML = '<option value="">All vendors</option>';
      vendors.forEach(v => { const opt = document.createElement('option'); opt.value=v; opt.textContent=v; vendorFilter.appendChild(opt); });
    }
    function mergedRecord(base) {
      const e = getEdit(base.lot);
      return { ...base, choice:e.choice || '', physicalScore:e.physicalScore || '', pedigreeScore:e.pedigreeScore || '', secondLink:e.secondLink || '', notes:e.notes || '', total: totalScore(e) };
    }
    function compareValues(a,b,key,dir) {
      let av, bv;
      if (key === 'physical') { av = Number(a.physicalScore || 0); bv = Number(b.physicalScore || 0); }
      else if (key === 'pedigree') { av = Number(a.pedigreeScore || 0); bv = Number(b.pedigreeScore || 0); }
      else if (key === 'total') { av = Number(a.total || 0); bv = Number(b.total || 0); }
      else { av = Number(a.lot); bv = Number(b.lot); }
      const res = av === bv ? Number(a.lot) - Number(b.lot) : av - bv;
      return dir === 'asc' ? res : -res;
    }
    function filteredData() {
      const q = search.value.trim().toLowerCase();
      const selectedVendor = vendorFilter.value;
      const selectedChoice = choiceFilter.value;
      const pickedMode = pickedFilter.value;
      return lots.map(mergedRecord).filter(r => {
        const hay = `${r.lot} ${r.name} ${r.sire} ${r.dam} ${r.vendor}`.toLowerCase();
        const choice = r.choice || 'undecided';
        return (!q || hay.includes(q)) && (!selectedVendor || r.vendor === selectedVendor) && (!selectedChoice || choice === selectedChoice) && (pickedMode !== 'picked' || isPicked(r));
      }).sort((a,b) => compareValues(a,b,sortBy.value,sortDir.value));
    }
    function setRankButtons() {
      [rankTotalBtn, rankPhysicalBtn, rankPedigreeBtn].forEach(b => b.classList.remove('active'));
      if (sortBy.value === 'total') rankTotalBtn.classList.add('active');
      if (sortBy.value === 'physical') rankPhysicalBtn.classList.add('active');
      if (sortBy.value === 'pedigree') rankPedigreeBtn.classList.add('active');
    }
    function render() {
      const records = filteredData();
      const yesCount = Object.values(edits).filter(e => e.choice === 'yes').length;
      const pickedCount = Object.values(edits).filter(isPicked).length;
      summary.innerHTML = `<div>${records.length} shown</div><div>${pickedCount} updated • ${yesCount} yes</div>`;
      setRankButtons();
      grid.innerHTML = '';
      records.forEach(record => {
        const choice = record.choice || 'undecided';
        const choiceClass = choice === 'yes' ? 'y' : choice === 'no' ? 'n' : 'u';
        const notesBlock = record.notes ? `<div class="notes">${escapeHtml(record.notes)}</div>` : '';
        const secondLink = record.secondLink ? `<button class="chipbtn" type="button" data-openlink="${record.lot}">L2</button>` : '';
        const card = document.createElement('article');
        card.className = 'card';
        card.innerHTML = `
          <div class="media">
            <img src="${lotImage(record.lot)}" alt="Lot ${record.lot}" loading="lazy" onerror="this.style.display='none';this.parentElement.innerHTML='<div class=\\'imgfallback\\'>No image found for Lot ${record.lot}</div>'">
            <div class="overlayTop">
              <div class="glass">${record.lot}</div>
              <div class="glass">${escapeHtml(record.vendor)}</div>
            </div>
            <div class="overlayBottom">
              <div class="glassGroup" data-choicegroup="${record.lot}">
                <button class="choiceBtn ${choice==='yes'?'active y':''}" type="button" data-choice="yes" data-lot="${record.lot}">Y</button>
                <button class="choiceBtn ${choice==='undecided' || !choice ? 'active u':''}" type="button" data-choice="undecided" data-lot="${record.lot}">U</button>
                <button class="choiceBtn ${choice==='no'?'active n':''}" type="button" data-choice="no" data-lot="${record.lot}">N</button>
              </div>
              <div class="glassGroup">
                <button class="chipbtn" type="button" data-admin="${record.lot}">⋯</button>
              </div>
            </div>
          </div>
          <div class="body">
            <div class="titleRow">
              <div><div class="lot">Lot ${record.lot}</div><div class="name">${escapeHtml(record.name)}</div></div>
              <div class="sex">${escapeHtml(record.sex || '')}</div>
            </div>
            <div class="meta"><span class="label">S:</span> ${escapeHtml(record.sire)}</div>
            <div class="meta"><span class="label">D:</span> ${escapeHtml(record.dam)}</div>
            <div class="compactRow">
              <button class="chipbtn" type="button" data-photo="${record.lot}">Pic</button>
              <button class="chipbtn" type="button" data-pdf="${record.lot}">Ped</button>
              ${secondLink}
              <div class="scoreGroup">
                <span class="scoreTag">P</span>
                ${[1,2,3,4,5].map(n => `<button class="scorebtn ${String(record.physicalScore)===String(n)?'active':''}" type="button" data-scoretype="physical" data-score="${n}" data-lot="${record.lot}">${n}</button>`).join('')}
              </div>
            </div>
            <div class="compactRow">
              <div class="scoreGroup">
                <span class="scoreTag">G</span>
                ${[1,2,3,4,5].map(n => `<button class="scorebtn ${String(record.pedigreeScore)===String(n)?'active':''}" type="button" data-scoretype="pedigree" data-score="${n}" data-lot="${record.lot}">${n}</button>`).join('')}
              </div>
              <div class="glass">T ${record.total || 0}</div>
            </div>
            ${notesBlock}
          </div>`;
        grid.appendChild(card);
      });
      bindActions();
    }
    function updateChoice(lot, choice) {
      const e = getEdit(lot);
      edits[String(lot)] = { ...e, choice };
      if (!isPicked(edits[String(lot)])) delete edits[String(lot)];
      saveEdits();
      render();
    }
    function updateScore(lot, key, value) {
      const e = getEdit(lot);
      const existing = String(e[key] || '');
      const next = existing === String(value) ? '' : String(value);
      edits[String(lot)] = { ...e, [key]: next };
      if (!isPicked(edits[String(lot)])) delete edits[String(lot)];
      saveEdits();
      render();
    }
    function openAdmin(lot) {
      currentLot = lot;
      const base = lots.find(x => x.lot === lot);
      const e = getEdit(lot);
      modalTitle.textContent = `Lot ${lot} — ${base.name}`;
      modalSub.textContent = `${base.sire} x ${base.dam}`;
      secondLink.value = e.secondLink || '';
      notes.value = e.notes || '';
      adminDialog.showModal();
    }
    function saveAdmin() {
      if (currentLot == null) return;
      const e = getEdit(currentLot);
      edits[String(currentLot)] = { ...e, secondLink: secondLink.value.trim(), notes: notes.value.trim() };
      if (!isPicked(edits[String(currentLot)])) delete edits[String(currentLot)];
      saveEdits();
      adminDialog.close();
      render();
    }
    function clearAdmin() {
      if (currentLot == null) return;
      delete edits[String(currentLot)];
      saveEdits();
      adminDialog.close();
      render();
    }
    function exportData() {
      const blob = new Blob([JSON.stringify(edits,null,2)], { type:'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href = url; a.download = 'racecoast-sales-window-updates.json'; a.click(); URL.revokeObjectURL(url);
    }
    function importData(file) {
      const reader = new FileReader();
      reader.onload = () => {
        try { const parsed = JSON.parse(reader.result); edits = parsed && typeof parsed === 'object' ? parsed : {}; saveEdits(); render(); }
        catch { alert('Could not import that file.'); }
      };
      reader.readAsText(file);
    }
    function bindActions() {
      document.querySelectorAll('[data-choice]').forEach(btn => btn.addEventListener('click', () => updateChoice(Number(btn.dataset.lot), btn.dataset.choice)));
      document.querySelectorAll('[data-scoretype]').forEach(btn => btn.addEventListener('click', () => updateScore(Number(btn.dataset.lot), btn.dataset.scoretype + 'Score', btn.dataset.score)));
      document.querySelectorAll('[data-admin]').forEach(btn => btn.addEventListener('click', () => openAdmin(Number(btn.dataset.admin))));
      document.querySelectorAll('[data-photo]').forEach(btn => btn.addEventListener('click', () => window.open(lotImage(Number(btn.dataset.photo)), '_blank')));
      document.querySelectorAll('[data-pdf]').forEach(btn => btn.addEventListener('click', () => window.open(lotPedigree(Number(btn.dataset.pdf)), '_blank')));
      document.querySelectorAll('[data-openlink]').forEach(btn => btn.addEventListener('click', () => { const e=getEdit(Number(btn.dataset.openlink)); if (e.secondLink) window.open(e.secondLink, '_blank'); }));
    }

    openFiltersBtn.addEventListener('click', () => filtersDialog.showModal());
    closeFiltersBtn.addEventListener('click', () => filtersDialog.close());
    search.addEventListener('input', render);
    [vendorFilter, choiceFilter, pickedFilter, sortBy, sortDir].forEach(el => el.addEventListener('change', render));
    clearFiltersBtn.addEventListener('click', () => { vendorFilter.value=''; choiceFilter.value=''; pickedFilter.value=''; sortBy.value='lot'; sortDir.value='asc'; render(); });
    shortlistBtn.addEventListener('click', () => { pickedFilter.value='picked'; choiceFilter.value='yes'; sortBy.value='total'; sortDir.value='desc'; render(); });
    allLotsBtn.addEventListener('click', () => { search.value=''; vendorFilter.value=''; choiceFilter.value=''; pickedFilter.value=''; sortBy.value='lot'; sortDir.value='asc'; render(); });
    rankTotalBtn.addEventListener('click', () => { sortBy.value='total'; sortDir.value='desc'; render(); });
    rankPhysicalBtn.addEventListener('click', () => { sortBy.value='physical'; sortDir.value='desc'; render(); });
    rankPedigreeBtn.addEventListener('click', () => { sortBy.value='pedigree'; sortDir.value='desc'; render(); });
    exportBtn.addEventListener('click', exportData);
    importBtn.addEventListener('click', () => importFile.click());
    importFile.addEventListener('change', e => { const file = e.target.files?.[0]; if (file) importData(file); importFile.value=''; });
    saveBtn.addEventListener('click', saveAdmin);
    cancelBtn.addEventListener('click', () => adminDialog.close());
    deleteEntryBtn.addEventListener('click', clearAdmin);

    populateVendorFilter();
    render();
  </script>
</body>
</html>
